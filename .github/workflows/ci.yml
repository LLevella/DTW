name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-test:
    name: ${{ matrix.compiler }} ${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler:
          - g++
          - clang++
        build_type:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        env:
          CXX: ${{ matrix.compiler }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --build-config ${{ matrix.build_type }} --output-on-failure

  sanitizer:
    name: Address/UB sanitizer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build-sanitize -DCMAKE_BUILD_TYPE=Debug
        env:
          CXX: g++
          CXXFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer
          LDFLAGS: -fsanitize=address,undefined

      - name: Build
        run: cmake --build build-sanitize --parallel

      - name: Test
        run: ctest --test-dir build-sanitize --output-on-failure

  package:
    name: Package release artifact
    runs-on: ubuntu-latest
    needs:
      - build-test
      - sanitizer
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build --prefix dist

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: dtw-${{ github.ref_name }}
          path: dist
